# MSAs
########################

# path(s) to search for protein MSAs (for PDB datasets)
protein_msa_dirs:
  - {"dir": "/projects/msa/rf2aa_af3/rf2aa_paper_model_protein_msas", "extension": ".a3m.gz", "directory_depth": 2}
