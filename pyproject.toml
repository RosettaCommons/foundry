[project]
name = "modelhub"
dynamic = ["version"]
description = "Base repository for models in the Bakerlab"
readme = "README.md"
requires-python = ">= 3.10"
authors = [
    { name = "Bakerlab", email = "" },
]

# Build settings ----------------------------------------------------------------------
[build-system]
requires = [
    "hatchling",
    "hatch-vcs == 0.4",
]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "rf2aa/version.py"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["rf2aa"]
