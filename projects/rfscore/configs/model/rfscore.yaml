# @package _global_

defaults:
  - /model/af3
  - _self_

model:
  net:
    _target_: projects.rfscore.model.RFScore.RFScore

    feature_initializer:
      input_feature_embedder:
        atom_attention_encoder:
          c_atom_1d_features: 392 # Add three channels to concatenate the ground-truth reference conformer as well
          atom_1d_features:
            - ref_pos
            - ref_charge
            - ref_mask
            - ref_element
            - ref_atom_name_chars
            - ref_pos_ground_truth

    recycler:
      template_embedder:
        raw_template_dim: 66

    diffusion_module:
      atom_attention_encoder:
        c_atom_1d_features: 392 # Add three channels to concatenate the ground-truth reference conformer as well
        atom_1d_features:
          - ref_pos
          - ref_charge
          - ref_mask
          - ref_element
          - ref_atom_name_chars
          - ref_pos_ground_truth