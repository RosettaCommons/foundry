# @package _global_

name: af3-old-msas-pdb-only-experimental

defaults:
  - override /callbacks: experimental_validation
  - override /datasets: af3_experimental_data
  - override /model: af3
  - override /trainer/metrics: experimental_validation

tags:
  - af3

project: af3

callbacks: 
  fit_and_evaluate_on_experimental_data_callback:
    datasets: 
      - ts1_unconditional

datasets: 
  train: 
    pdb:
      # We must adjust the probability, since we set the monomer distillation dataset to null
      probability: 1.0
    # Datasets set to null are ignored
    monomer_distillation: null
  val:
    # Standard validation, subsetting to < 400 tokens for speed
    af3_validation:
      dataset:
        dataset:
          filters:
            - "n_tokens_total < 400"
    # Experimental validation
    ts1_unconditional:
      dataset:
        dataset_parser:
          _target_: datahub.datasets.parsers.GenericDFParser
          attrs:
            selection_strings:
              - "B/*/*/C5"
              - "A/*/128/CB"
              - "A/*/95/N"
              - "A/*/95/CD2"
              - "A/*/53/O"
        dataset:
          data: /projects/ml/rfscore/datasets/experimental_validation/serine_hydrolase/dfs/ts1.parquet
      key_to_balance: null # (Because we inherit from AF-3 validation, we must set to null)

paths:
  data: 
    protein_msa_dirs:
      - {"dir": "/projects/msa/rf2aa_af3/rf2aa_paper_model_protein_msas", "extension": ".a3m.gz", "directory_depth": 2}
      - {"dir": "/projects/msa/rf2aa_af3/missing_msas_through_2024_08_12", "extension": ".msa0.a3m.gz", "directory_depth": 2}
      - {"dir": "/projects/msa/nvidia_renamed_with_seq_hash/maxseq_10k", "extension": ".a3m.gz", "directory_depth": 2}
