# @package _global_

name: train-ground-truth-conformer-adjusted-atom-names

# For explanation of the "override" syntax, see: https://hydra.cc/docs/upgrades/1.0_to_1.1/defaults_list_override/
defaults:
  - override /datasets: rfscore_ground_truth_conformer
  - override /model: rfscore
  - override /logger: csv

tags:
  # list of tags to add to the run (& on wandb to easily find & filter runs)
  - experiment
  - ligand-conditioning
  - ground-truth-conformer
  - adjusted-atom-names

model:
  lr_scheduler:
    base_lr: 0.9e-3 # 1/2 of original learning rate (1.8e-3)
  net:
    recycler:
      template_embedder:
        # For concatenated encoding, raw_template_dim: 66
        raw_template_dim: 66

ckpt_path: /projects/ml/modelhub/inference/weights_with_no_confidence_2025_1_21_new_modelhub.ckpt

datasets:
  # Dataloading pipeline to use
  train: 
    pdb:
      sub_datasets:
        interface:
          dataset:
            transform:
              p_use_ground_truth_conformer: 0.5 # Half of the time, use the ground truth conformer for non-polymers
              use_element_for_atom_names_of_atomized_tokens: True
        pn_unit:
          dataset:
            transform:
              p_use_ground_truth_conformer: 0.5 # Half of the time, use the ground truth conformer for non-polymers
              use_element_for_atom_names_of_atomized_tokens: True
  val:
    ground_truth_conformers:
      dataset:
        transform:
          use_element_for_atom_names_of_atomized_tokens: True
    unconditional:
      dataset:
        transform:
          use_element_for_atom_names_of_atomized_tokens: True
