defaults:
  - ddp
  - loss/losses/diffusion_loss@loss.verbose_diffusion_loss  # just inherits one loss.
  - metrics: design_metrics
  - _self_

_target_: modelhub.trainers.af3.AF3Trainer

n_examples_per_epoch: 2400 # 24000 # 10x as many epochs
checkpoint_every_n_epochs: 10 #  Less often checkpointing for fewer epochs
validate_every_n_epochs: 2  # Validate often

max_epochs: 100_000
prevalidate: False

clip_grad_max_norm: 10.0
output_dir: ${paths.output_dir}
n_recycles_train: 1
grad_accum_steps: 3
skip_optimizer_loading: False

loss:
  verbose_diffusion_loss:
    _target_: projects.aa_design.metrics.losses.VerboseDiffusionLoss
    clamp_diffusion_loss: True
    alpha_virtual_atom: 0.75
    alpha_motif: 0.0
    w_fixed_motif: 0.0
    ldtt_weight: 0.0


