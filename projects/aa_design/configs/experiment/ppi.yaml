# @package _global_

defaults:
  - override /datasets: ppi
  - override /logger: csv  # turn off wandb
  - _self_

name: unet-indexed
tags:
  - atom14
  - unet
  - indexed
  - ${datasets.global_transform_args.central_atom}

trainer:
  prevalidate: True
  loss:
    verbose_diffusion_loss:
      alpha_motif: 1.0
      w_fixed_motif: 2.0  # weight on coordinate recapitulation
  skip_optimizer_loading: True

datasets:
  diffusion_batch_size_train: 2
  diffusion_batch_size_inference: 2

