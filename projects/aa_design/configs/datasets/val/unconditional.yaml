dataset:
  _target_: projects.aa_design.transforms.datasets.ContigJsonDataset
  data: ${paths.data.design_benchmark_data_dir}/monomer.json
  subset_to_keys: null  # Specific keys in json to keep, ignores all others.
  name: unconditional-design

  cif_parser_args:
    cache_dir: null
    load_from_cache: False
    save_to_cache: False

    # During inference, we have special columns to handle
    add_missing_atoms: False
    
  transform:
    # common Transform pipeline components for all PDB datasets
    _target_: ${datasets.pipeline_target}
    is_inference: True
    return_atom_array: True # return atom array for inference
    diffusion_batch_size: ${datasets.diffusion_batch_size_inference}
    allowed_types: ${datasets.global_transform_args.allowed_types}
    central_atom: ${datasets.global_transform_args.central_atom}
    n_atoms_per_token: ${datasets.global_transform_args.n_atoms_per_token}
    train_masks: ${datasets.global_transform_args.train_masks}
