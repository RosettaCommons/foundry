experiment:
  name: rf2_deep_layerdropout
  trainer: "composed"
  n_epoch: 800
  output_dir: null

dataset_params: 
  n_train: 4800
  validate_every_n_epochs: 1
  fraction_pdb: 0.12
  fraction_fb: 0.36
  fraction_compl: 0.055
  fraction_neg_compl: 0
  fraction_na_compl: 0.055
  fraction_neg_na_compl: 0
  fraction_distil_tf: 0.055 
  fraction_tf: 0
  fraction_neg_tf: 0 
  fraction_rna: 0.02
  fraction_dna: 0.005 
  fraction_sm_compl: 0.11 
  fraction_metal_compl: 0.03
  fraction_sm_compl_multi: 0.025
  fraction_sm_compl_covale: 0.025
  fraction_sm: 0.0
  fraction_atomize_pdb: 0.0425
  fraction_atomize_complex: 0.0425
  fraction_sm_compl_asmb: 0.055
  fraction_sm_compl_furthest_neg: 0
  fraction_sm_compl_permuted_neg: 0 
  fraction_sm_compl_docked_neg: 0 
  n_valid_pdb: 256
  n_valid_homo: 0
  n_valid_dslf: 0 
  n_valid_compl: 256
  n_valid_neg_compl: 0 
  n_valid_na_compl: 0 
  n_valid_neg_na_compl: 0 
  n_valid_distil_tf: 0 
  n_valid_tf: 0 
  n_valid_neg_tf: 0 
  n_valid_rna: 256
  n_valid_dna: 256
  n_valid_sm_compl: 256
  n_valid_metal_compl: 0 
  n_valid_sm_compl_multi: 0
  n_valid_sm_compl_covale: 0 
  n_valid_sm_compl_strict: 256
  n_valid_sm: 0 
  n_valid_atomize_pdb: 0 
  n_valid_atomize_complex: 0 
  n_valid_sm_compl_asmb: 0
  n_valid_sm_compl_furthest_neg: 0 
  n_valid_sm_compl_permuted_neg: 0 
  n_valid_sm_compl_docked_neg: 0 
  n_valid_dude_actives: 0 
  n_valid_dude_inactives: 0 
  p_homo_cut: 0
  p_short_crop: 0 
  p_dslf_crop: 0 
  dslf_fb_upsample: 1

loader_params: 
  maxseq: 1024
  maxtoken: 1024
  maxlat: 128
  crop: 256
  rescut: 4.5
  mintplt: 1
  maxtplt: 4
  seqid: 150.0
  p_msa_mask: 0.15
  maxcycle: 4
  nres_atomize_min: 3
  nres_atomize_max: 5
  atomize_flank: 0
  p_metal: 1
  p_atomize_modres: 1
  batch_by_dataset: True
  batch_by_length: True
  dataloader_kwargs:
    shuffle: False
    num_workers: 3
    pin_memory: True

ddp_params:
  accum: 1
  batch_size: 1
  port: 12435

training_params: 
  resume_train: False
  EMA: 0.99
  weight_decay: 0.01
  learning_rate: .001
  learning_rate_schedule:
    num_warmup_steps: 0
    num_steps_decay: 5000
    decay_rate: 0.95
  grad_clip: 0.2
  use_amp: False

loss_param:
  w_dist: 1.0
  w_str: 10.0
  w_inter_fape: 0.0
  w_lig_fape: 0.0
  w_lddt: 0.1
  w_aa: 3.0
  w_bond: 0.0
  w_bind: 0.0
  binder_loss_label_smoothing: 0.0
  w_clash: 0.0
  w_atom_bond: 0.0
  w_skip_bond: 0.0
  w_rigid: 0.0
  w_hb: 0.0
  w_pae: 0.1
  w_pde: 0.0
  lj_lin: 0.75

log_params:
  log_every_n_examples: 16

eval_params: null

model: 
  global_params:
    d_msa: 256
    d_msa_full: 64
    d_pair: 128
    d_state: 32

  embedding:
    rf2aa:
      params: 
        p_drop: 0.15
        d_templ: 64
        n_head_templ: 4
        d_hidden_templ: 64
        templ_p_drop: 0.25
        symmetrize_repeats: False
        repeat_length: null
        symmsub_k: null
        sym_method: null
        main_block: null
        copy_main_block_template: False
        additional_dt1d: 0
        recycling_type: "msa_pair"
        use_same_chain: False
  blocks:
    RF2aa_full:
      num_blocks: 4
      params:
        d_rbf: 64
        p_drop_row: 0.25
        p_drop_pair: 0.25
        p_drop_layer: 0.15
        msa_transition_drop: 0.0
        outer_product_channels: 16 
        p_drop_outer_product: 0.0
        n_pair_head: 6
        n_pair_channels: 32
        n_msa_head: 8
        n_msa_channels: 8
        structure_bias_gate_channels: 16
        structure_bias_channels: 64
        n_se3_layers: 1
        n_se3_channels: 48
        n_se3_degrees: 2
        n_se3_head: 4
        n_div: 4
        l0_in_features: 32
        l0_out_features: 32
        l1_in_features: 6
        l1_out_features: 2
        n_se3_edge_features: 32
        sc_pred_d_hidden: 128
        sc_pred_p_drop: 0.0
    RF2aa:
      num_blocks: 48
      params:
        d_rbf: 64
        p_drop_row: 0.25
        p_drop_pair: 0.25
        p_drop_layer: 0.15
        msa_transition_drop: 0.0
        outer_product_channels: 16 
        p_drop_outer_product: 0.0
        n_pair_head: 6
        n_pair_channels: 32
        n_msa_head: 8
        n_msa_channels: 32
        structure_bias_gate_channels: 16
        structure_bias_channels: 64
        n_se3_layers: 1
        n_se3_channels: 48
        n_se3_degrees: 2
        n_se3_head: 4
        n_div: 4
        l0_in_features: 32
        l0_out_features: 32
        l1_in_features: 6
        l1_out_features: 2
        n_se3_edge_features: 32
        sc_pred_d_hidden: 128
        sc_pred_p_drop: 0.0
  refinement:
    local_adaptor:
      params:
        num_iterations: 4
        d_rbf: 64
        n_se3_layers: 1
        n_se3_channels: 128
        n_se3_degrees: 2
        n_se3_head: 4
        n_div: 4
        adaptor_features: 32
        l0_in_features: 64
        l0_out_features: 64
        l1_in_features: 6
        l1_out_features: 2
        n_se3_edge_features: 64
        top_k: 64
        sc_pred_d_hidden: 128
        sc_pred_p_drop: 0.15
  
  auxiliary_predictors:
    c6d:
      n_feat: 128
      input_feature: "pair"
    mlm:
      n_feat: 256
      input_feature: "msa"
    pae:
      n_feat: 128
      input_feature: "pair"
    plddt: 
      n_feat: 32
      input_feature: "state"
   
chem_params:
  use_phospate_frames_for_NA: False
