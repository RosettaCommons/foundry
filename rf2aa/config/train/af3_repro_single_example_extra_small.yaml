defaults:
  - af3_repro_single_example_small
  - _self_

cpu_training: true
training_params:
  ddp_backend: gloo

model:
  recycler:
    n_pairformer_blocks: 2
    template_embedder:
      n_block: 2
    msa_module:
      n_block: 2
  diffusion_module:
    atom_attention_encoder:
      atom_transformer:
        diffusion_transformer:
          n_block: 2
    diffusion_transformer:
      n_block: 2
    atom_attention_decoder:
      atom_transformer:
        diffusion_transformer:
          n_block: 2

logger:
  sublogger:
    project: af3-debug-cpu

autograd_detect_anomaly: true