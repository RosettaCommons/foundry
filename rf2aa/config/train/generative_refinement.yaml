defaults:
  - rf2aa

experiment:
  name: rfaa-flow-matching-allatom
  trainer: "flow_matching"

interpolant:
  min_t: 1e-2
  separate_t: False
  provide_kappa: False
  hierarchical_t: False
  codesign_separate_t: False
  codesign_forward_fold_prop: 0.0
  codesign_inverse_fold_prop: 0.0

  twisting:
    use: False

  rots:
    corrupt: True
    train_schedule: linear
    sample_schedule: linear
    exp_rate: 10

  trans:
    corrupt: True
    batch_ot: True
    train_schedule: linear
    sample_schedule: linear
    sample_temp: 1.0
    vpsde_bmin: 0.1
    vpsde_bmax: 20.0
    potential: null
    potential_t_scaling: False
    rog:
      weight: 10.0
      cutoff: 5.0

  aatypes:
    corrupt: False
    schedule: linear
    schedule_exp_rate: 10
    temp: 1.0
    noise: 0.0
    do_purity: False
    train_extra_mask: 0.0
    interpolant_type: masking
    num_tokens: 80

  sampling:
    num_timesteps: 20
    do_sde: False
  self_condition: False

model:
  blocks:
    RF2aa_full:
      num_blocks: 1
      params:
        d_rbf: 64
        p_drop_row: 0.25
        p_drop_pair: 0.25
        p_drop_layer: 0.0
        msa_transition_drop: 0.0
        outer_product_channels: 16 
        p_drop_outer_product: 0.0
        n_pair_head: 6
        n_pair_channels: 32
        n_msa_head: 8
        n_msa_channels: 8
        structure_bias_gate_channels: 16
        structure_bias_channels: 64
        n_se3_layers: 1
        n_se3_channels: 32
        n_se3_degrees: 2
        n_se3_head: 4
        n_div: 4
        l0_in_features: 64
        l0_out_features: 64
        l1_in_features: 6
        l1_out_features: 2
        n_se3_edge_features: 64
        sc_pred_d_hidden: 128
        sc_pred_p_drop: 0.0
        residual_state: True
    RF2aa:
      num_blocks: 1
  refinement:
    generative: 
      params:
        num_atom_encode_layers: 1
        num_attention_layers: 1
        num_channels: 32
        num_degrees: 2
        n_heads: 4
        div: 4
        l0_in_features: 64
        l0_out_features: 64
        l1_in_features: 3
        l1_out_features: 1
        num_edge_features: 4
        n_channels: 32
        msa_transition_drop: 0.0

dataset_params:
  n_train: 24000
  validate_every_n_epochs: 1
  fraction_pdb: 0.12
  fraction_fb: 0.36
  fraction_compl: 0.055
  fraction_neg_compl: 0
  fraction_na_compl: 0.055
  fraction_neg_na_compl: 0
  fraction_distil_tf: 0.055
  fraction_tf: 0
  fraction_neg_tf: 0
  fraction_rna: 0.02
  fraction_dna: 0.005
  fraction_sm_compl: 0.11
  fraction_metal_compl: 0.03
  fraction_sm_compl_multi: 0.025
  fraction_sm_compl_covale: 0.025
  fraction_sm: 0.0
  fraction_atomize_pdb: 0.0425
  fraction_atomize_complex: 0.0425
  fraction_sm_compl_asmb: 0.055
loss_param:
  w_trans: 10.0
  t_normalize_clip: 0.9
  trans_scale: 0.1
  w_dist: 1.0
  w_str: 0.0
  w_inter_fape: 0.0
  w_lig_fape: 0.0
  w_lddt: 0.0
  w_aa: 3.0
  w_bond: 0.0
  w_bind: 0.0
  binder_loss_label_smoothing: 0.0
  w_clash: 0.0
  w_atom_bond: 0.0
  w_skip_bond: 0.0
  w_rigid: 0.0
  w_hb: 0.0
  w_pae: 0.0
  w_pde: 0.0
  lj_lin: 0.75
