defaults:
  - base
  - loader_params: default
  - _self_
experiment:
  name: msa_module
  trainer: msa_module
  output_dir: /net/scratch/rohith/msa_module_overfit

model_globals:
  l_max: 5000
model:
  _target_: "rf2aa.experiments.msa_module_trainer.MsaModulewithDist"
  c_s: 384
  c_z: 128
  c_atom: 128
  c_atompair: 16
  c_s_inputs: 449
  feature_initializer:
    c_s_inputs: ${model.c_s_inputs}
    input_feature_embedder:
      features:
        - restype
        - profile
        - deletion_mean
      atom_attention_encoder:
        c_token: 384
        c_atom_1d_features: 389
        c_tokenpair: ${model.c_z}
        atom_1d_features:
          - ref_pos
          - ref_charge
          - ref_mask
          - ref_element
          - ref_atom_name_chars
        atom_transformer:
          n_queries: 32
          n_keys: 128
          l_max: ${model_globals.l_max}
          diffusion_transformer:
            n_block: 3
            diffusion_transformer_block:
              n_head: 4
    relative_position_encoding:
      r_max: 32
      s_max: 2
  msa_module:
    n_block: 4
    c_m: 64
    p_drop_msa: 0.15
    p_drop_pair: 0.25
    msa_subsample_embedder:
      num_sequences: 1024
      dim_raw_msa: 34
      c_s_inputs: ${model.c_s_inputs}
      c_msa_embed: ${model.msa_module.c_m}
    outer_product: 
      c_msa_embed: ${model.msa_module.c_m}
      c_outer_product: 32
      c_out: ${model.c_z}
    msa_pair_weighted_averaging: 
      n_heads: 8
      c_weighted_average: 32
      c_msa_embed: ${model.msa_module.c_m}
      c_z: ${model.c_z}
    msa_transition: 
      n: 4  
      c: ${model.msa_module.c_m}
    triangle_multiplication_outgoing: 
      d_pair: ${model.c_z}
      d_hidden: 128
      bias: True
    triangle_multiplication_incoming: 
      d_pair: ${model.c_z}
      d_hidden: 128
      bias: True
    triangle_attention_starting: 
      d_pair: ${model.c_z}
      n_head: 4
      d_hidden: 32
      p_drop: 0.0
    triangle_attention_ending: 
      d_pair: ${model.c_z}
      n_head: 4
      d_hidden: 32
      p_drop: 0.0
    pair_transition: 
      n: 4
      c: ${model.c_z}
  n_pairformer_blocks: 48
  pairformer_block:
    p_drop: 0.25
    c: 128
    attention_pair_bias:
      n_head: 16
  distogram_head:
    bins: 65

af3_data_prep:
  D: 32
  sigma_data: 16
  s_trans: 1
  random_augmentation: True
  only_ca: False
  t: null

loss:
  distogram_loss:
    weight: 3e-2
loader_params:
  p_msa_mask: 0.0
  maxseq: 5132