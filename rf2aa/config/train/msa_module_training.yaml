defaults:
  - base
  - loader_params: default
  - _self_
experiment:
  name: msa_module
  trainer: msa_module
  output_dir: /net/scratch/rohith/msa_module_overfit

model_globals:
  l_max: 5000
model:
  _target_: "rf2aa.experiments.msa_module_trainer.MsaModulewithDist"
  c_s: 384
  c_z: 128
  c_atom: 128
  c_atompair: 16
  c_s_inputs: 449
  feature_initializer:
    c_s_inputs: ${model.c_s_inputs}
    input_feature_embedder:
      features:
        - restype
        - profile
        - deletion_mean
      atom_attention_encoder:
        c_token: 384
        c_atom_1d_features: 389
        c_tokenpair: ${model.c_z}
        atom_1d_features:
          - ref_pos
          - ref_charge
          - ref_mask
          - ref_element
          - ref_atom_name_chars
        atom_transformer:
          n_queries: 32
          n_keys: 128
          l_max: ${model_globals.l_max}
          diffusion_transformer:
            n_block: 3
            diffusion_transformer_block:
              n_head: 4
    relative_position_encoding:
      r_max: 32
      s_max: 2
  msa_module:
    n_block: 4
    c_m: 64
    p_drop_msa: 0.15
    p_drop_pair: 0.25
    msa_subsample_embedder:
      num_sequences: 1024
      dim_raw_msa: 34
      c_s_inputs: ${model.c_s_inputs}
      c_msa_embed: ${model.msa_module.c_m}
    outer_product: 
      c_msa_embed: ${model.msa_module.c_m}
      c_outer_product: 32
      c_out: ${model.c_z}
    msa_pair_weighted_averaging: 
      n_heads: 8
      c_weighted_average: 32
      c_msa_embed: ${model.msa_module.c_m}
      c_z: ${model.c_z}
    msa_transition: 
      n: 4  
      c: ${model.msa_module.c_m}
    triangle_multiplication_outgoing: 
      d_pair: ${model.c_z}
      d_hidden: 128
      bias: True
    triangle_multiplication_incoming: 
      d_pair: ${model.c_z}
      d_hidden: 128
      bias: True
    triangle_attention_starting: 
      d_pair: ${model.c_z}
      n_head: 4
      d_hidden: 32
      p_drop: 0.0
    triangle_attention_ending: 
      d_pair: ${model.c_z}
      n_head: 4
      d_hidden: 32
      p_drop: 0.0
    pair_transition: 
      n: 4
      c: ${model.c_z}
  n_pairformer_blocks: 48
  pairformer_block:
    p_drop: 0.25
    c: 128
    attention_pair_bias:
      n_head: 16
  distogram_head:
    bins: 65

af3_data_prep:
  D: 32
  sigma_data: 16
  s_trans: 1
  random_augmentation: True
  only_ca: False
  t: null

loss:
  distogram_loss:
    weight: 3e-2
loader_params:
  n_fallback_retries: 0 
  p_msa_mask: 0.0
  maxseq: 5132


paths:
  pdb_data_dir: /projects/ml/RF2_allatom/datasets/af3_splits/2024_09_23
  protein_msa_dirs:
    - {"dir": "/projects/msa/rf2aa_af3/rf2aa_paper_model_protein_msas", "extension": ".a3m.gz", "directory_depth": 2}
    - {"dir": "/projects/msa/rf2aa_af3/missing_msas_through_2024_08_12", "extension": ".msa0.a3m.gz", "directory_depth": 2}
  rna_msa_dirs:
    - {"dir": "/projects/msa/rf2aa_af3/rf2aa_paper_model_rna_msas", "extension": ".afa", "directory_depth": 0}
  
cif_parser_caching_args:
  cache_dir: /projects/ml/RF2_allatom/cache/cif
  load_from_cache: True
  save_to_cache: False


dataset_params:

  diffusion_batch_size: 32
  constructor:
    _target_: "rf2aa.data.compose_data_datahub_new.NewDatapipeTrainer"
  default_transform: datahub.pipelines.af3.build_af3_transform_pipeline
  train:
    # ... train datasets
    pdb:
      probability: 0.5
      sub_datasets:
        pn_unit:
          dataset: 
            _target_: datahub.datasets.base.StructuralDatasetWrapper
            save_failed_examples_to_dir: null
            cif_parser:
              _target_: cifutils.CIFParser
            cif_parser_args: ${cif_parser_caching_args}
            dataset_parser:
              _target_: datahub.datasets.dataframe_parsers.PNUnitsDFParser
            dataset:
              _target_: datahub.datasets.base.PandasDataset
              name: pn_unit
              id_column: example_id
              data: ${paths.pdb_data_dir}/pn_units_df_train.parquet
              filters:
                - "deposition_date < '2021-09-30'"
                - "resolution < 9.0"
                - "num_polymer_pn_units <= 300" 
                - "cluster.notnull()"
                - "~(q_pn_unit_non_polymer_res_names.notnull() and q_pn_unit_non_polymer_res_names.str.contains('${resolve_import:cifutils.constants.AF3_EXCLUDED_LIGANDS_REGEX}', regex=True))"
              columns_to_load:
                # columns required for identification, filtering & weighting
                - example_id
                - pdb_id
                - assembly_id
                - deposition_date
                - resolution
                - num_polymer_pn_units
                - method
                - cluster
                - n_prot
                - n_nuc
                - n_ligand
                # pn_unit specific columns
                - q_pn_unit_iid
                - q_pn_unit_non_polymer_res_names
            return_key: null
            transform:
              _target_: ${dataset_params.default_transform}
              protein_msa_dirs: ${paths.protein_msa_dirs}
              rna_msa_dirs: ${paths.rna_msa_dirs}
              n_recycles: ${loader_params.maxcycle}
              crop_size: ${loader_params.crop}
              crop_contiguous_probability: 0.3333333333333333
              crop_spatial_probability: 0.6666666666666667
              diffusion_batch_size: ${dataset_params.diffusion_batch_size}
          weights:
            _target_: datahub.samplers.calculate_weights_for_pdb_dataset_df
            beta: 0.5
            alphas:
              a_prot: 3.0
              a_nuc: 3.0
              a_ligand: 1.0

        interface:
          dataset:
            _target_: datahub.datasets.base.StructuralDatasetWrapper
            save_failed_examples_to_dir: null
            cif_parser:
              _target_: cifutils.CIFParser
            cif_parser_args: ${cif_parser_caching_args}
            dataset_parser:
              _target_: datahub.datasets.dataframe_parsers.InterfacesDFParser
            dataset:
              _target_: datahub.datasets.base.PandasDataset
              name: interface
              id_column: example_id
              data: ${paths.pdb_data_dir}/interfaces_df_train.parquet
              filters:
                - "deposition_date < '2021-09-30'"
                - "resolution < 9.0"
                - "num_polymer_pn_units <= 300" 
                - "cluster.notnull()"
                - "~(pn_unit_1_non_polymer_res_names.notnull() and pn_unit_1_non_polymer_res_names.str.contains('${resolve_import:cifutils.constants.AF3_EXCLUDED_LIGANDS_REGEX}', regex=True))"
                - "~(pn_unit_2_non_polymer_res_names.notnull() and pn_unit_2_non_polymer_res_names.str.contains('${resolve_import:cifutils.constants.AF3_EXCLUDED_LIGANDS_REGEX}', regex=True))"
                - "is_inter_molecule"
              columns_to_load:
                # columns required for identification, filtering & weighting
                - example_id
                - pdb_id
                - assembly_id
                - deposition_date
                - resolution
                - num_polymer_pn_units
                - method
                - cluster
                - n_prot
                - n_nuc
                - n_ligand
                # interface specific columns
                - pn_unit_1_iid
                - pn_unit_2_iid
                - pn_unit_1_non_polymer_res_names
                - pn_unit_2_non_polymer_res_names
                - is_inter_molecule
            return_key: null
            transform:
              _target_: ${dataset_params.default_transform}
              protein_msa_dirs: ${paths.protein_msa_dirs}
              rna_msa_dirs: ${paths.rna_msa_dirs}
              n_recycles: ${loader_params.maxcycle}
              crop_size: ${loader_params.crop}
              crop_contiguous_probability: 0.0
              crop_spatial_probability: 1.0
              diffusion_batch_size: ${dataset_params.diffusion_batch_size}
          weights:
            _target_: datahub.samplers.calculate_weights_for_pdb_dataset_df
            beta: 0.5
            alphas:
              a_prot: 3.0
              a_nuc: 3.0
              a_ligand: 1.0

    monomer_distillation:
      probability: 0.5
      sub_datasets:
        af2fb_distillation:
          dataset:
            _target_: datahub.datasets.base.StructuralDatasetWrapper
            save_failed_examples_to_dir: null

            # cif parser
            cif_parser:
              _target_: cifutils.CIFParser
            cif_parser_args:
              assume_residues_all_resolved: true
              cache_dir: null
              load_from_cache: false
              save_to_cache: false 

            # metadata parser
            dataset_parser:
              _target_: datahub.datasets.dataframe_parsers.AF2FB_DistillationParser

            # metadata dataset
            dataset:
              _target_: datahub.datasets.base.PandasDataset
              name: af2fb_distillation
              id_column: example_id
              data: /squash/af2_distillation_facebook/af2_distillation_facebook.parquet
              columns_to_load:
                - example_id
                - sequence_hash
            return_key: null
            transform:
              _target_: ${dataset_params.default_transform}
              protein_msa_dirs: [{"dir": "/squash/af2_distillation_facebook/msa", "extension": ".a3m", "directory_depth": 2}]
              rna_msa_dirs: []
              n_recycles: ${loader_params.maxcycle}
              crop_size: ${loader_params.crop}
              crop_contiguous_probability: 0.25
              crop_spatial_probability: 0.75
              diffusion_batch_size: ${dataset_params.diffusion_batch_size}

  val:
    # ... val datasets
    interface:
      _target_: datahub.datasets.base.StructuralDatasetWrapper
      cif_parser:
        _target_: cifutils.CIFParser
      dataset_parser:
        _target_: datahub.datasets.dataframe_parsers.ValidationDFParser
      dataset:
        _target_: datahub.datasets.base.PandasDataset
        name: val
        #id_column: ${dataset_params.train.interface.dataset.dataset.id_column}
        id_column: example_id
        data: ${paths.pdb_data_dir}/entry_level_val_df.parquet
        #columns_to_load:
            ## columns required for identification, filtering & weighting
            #- example_id
            #- pdb_id
            #- assembly_id
            ##- deposition_date
            #- resolution
            #- num_polymer_pn_units
            #- method
            #- cluster
            #- n_prot
            #- n_nuc
            #- n_ligand
            ## interface specific columns
            #- pn_unit_1_iid
            #- pn_unit_2_iid
      return_key: null
      transform:
        _target_: ${dataset_params.default_transform}
        protein_msa_dirs: ${paths.protein_msa_dirs}
        rna_msa_dirs: ${paths.rna_msa_dirs}
        n_recycles: ${loader_params.maxcycle}
        crop_size: ${loader_params.crop}
        crop_contiguous_probability: 0.0
        crop_spatial_probability: 0.0
        diffusion_batch_size: ${dataset_params.diffusion_batch_size}

